<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b2f5c">
<title>QR स्क्यान | फाइल व्यवस्थापन प्रणाली</title>
<link rel="apple-touch-icon" href="assets/nepal-emblem.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile-scan.css">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
</head>
<body class="ms-body">

<div class="ms-shell">

  <header class="ms-header">
    <img id="msLogo" src="assets/nepal-emblem.svg" alt="">
    <div>
      <div class="ms-office" id="msOffice">... गाउँपालिका</div>
      <div class="ms-sub">मोबाइल QR स्क्यानर</div>
    </div>
    <div class="ms-date" id="msDate">-</div>
  </header>

  <div class="ms-mode-toggle">
    <button class="ms-chip active" data-mode="taken">📤 फाइल लगेको</button>
    <button class="ms-chip" data-mode="returned">📥 फाइल फिर्ता (QR)</button>
    <button class="ms-chip" data-mode="photo-return">📷 फिर्ता (फोटो)</button>
  </div>

  <div class="ms-camera-wrap" id="msQrWrap">
    <div id="qr-reader" class="ms-reader"></div>
    <div class="ms-scan-hint" id="scanHint">QR कोडलाई फ्रेम भित्र राख्नुहोस्</div>
  </div>

  <div class="ms-photo-match hidden" id="msPhotoMatchBox">
    <p class="ms-photo-instruction">फाइलको <b>फ्रन्ट पेज</b> फेरि खिच्नुहोस् — दर्ता गर्दा खिचिएको फोटोसँग स्वतः मिलान गरिनेछ।</p>
    <input type="file" id="msReturnPhotoInput" accept="image/*" capture="environment">
    <div class="ms-candidates" id="msCandidates"></div>
  </div>

  <div id="msQrControls">
    <div class="ms-controls">
      <button class="ms-btn ms-btn-outline" id="btnTorch">🔦 टर्च</button>
      <button class="ms-btn ms-btn-outline" id="btnRestart">🔄 पुनः सुरु</button>
    </div>

    <div class="ms-manual">
      <input type="text" id="msManualId" placeholder="वा फाइल ID टाइप गर्नुहोस् (FTS-...)">
      <button class="ms-btn ms-btn-primary" id="msManualBtn">पुष्टि गर्ने</button>
    </div>
  </div>

  <div class="ms-feedback" id="msFeedback">क्यामेरा सुरु हुँदैछ...</div>

  <div class="ms-recent">
    <div class="ms-recent-title">हालसालैका स्क्यान</div>
    <ul id="msRecentList"></ul>
  </div>

  <div class="ms-footer">
    <span id="msBackendBadge">स्थानीय भण्डारण (Demo)</span>
    <a href="index.html">पूर्ण प्रणाली खोल्ने →</a>
  </div>

</div>

<script src="bs-date.js"></script>
<script src="image-match.js"></script>
<script src="firebase-config.js"></script>
<script src="mobile-scan.js"></script>
</body>
</html>
